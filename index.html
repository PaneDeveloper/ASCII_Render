<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASCII Gen V5.4 - Custom Hybrid</title>
    <!-- Socket.io para o teu server físico -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root {
            --green: #00ff41;
            --bg: #050505;
            --accent: #008f11;
            --panel: #111;
            --danger: #ff3e3e;
            --blue: #00a2ff;
            --modal-bg: rgba(0, 0, 0, 0.95);
        }

        body {
            background-color: var(--bg);
            color: var(--green);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        .viewport {
            display: flex;
            flex: 1;
            padding: 15px;
            gap: 15px;
            background: radial-gradient(circle at center, #0a0a0a 0%, #050505 100%);
        }

        .pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #000;
            border: 2px solid #222;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 30px rgba(0,0,0,1);
        }

        .pane label {
            position: absolute;
            top: 12px; left: 12px;
            font-size: 10px;
            background: rgba(0,0,0,0.9);
            padding: 6px 12px;
            border: 1px solid var(--green);
            z-index: 100;
            letter-spacing: 2px;
        }

        .media-layer {
            display: none;
            width: 100%; height: 100%;
            justify-content: center; align-items: center;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        #src-layer video, #src-layer img {
            width: 100%; height: 100%;
            object-fit: contain;
        }

        .placeholder {
            color: #1a1a1a;
            font-size: 24px;
            font-weight: 900;
            text-align: center;
        }

        canvas {
            max-width: 100%; max-height: 100%;
            object-fit: contain;
            image-rendering: pixelated;
        }

        .sidebar {
            width: 360px;
            background: var(--panel);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border-left: 3px solid #222;
            overflow-y: auto;
            box-shadow: -15px 0 40px rgba(0,0,0,0.9);
        }

        #hw-status {
            font-size: 9px;
            padding: 8px;
            border: 1px solid var(--green);
            background: #000;
            text-align: center;
            margin-bottom: 5px;
            cursor: pointer;
        }

        .control-group { display: flex; flex-direction: column; gap: 4px; }
        label { font-size: 9px; text-transform: uppercase; color: #777; font-weight: 700; }
        .stat-val { color: var(--green); float: right; font-size: 10px; }

        .btn {
            background: #1a1a1a;
            border: 1px solid var(--green);
            color: var(--green);
            padding: 8px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 10px;
            transition: 0.2s;
        }

        .btn:hover:not(:disabled) { background: var(--green); color: #000; }
        .btn-active { background: var(--green); color: #000; }
        .btn-start { background: #001f05; border-width: 2px; height: 40px; margin-top: 5px;}
        .btn-rec-active { background: var(--danger) !important; color: white !important; animation: pulse 1.5s infinite; }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
            margin: 10px 0;
        }
        input[type="range"]::-webkit-slider-runnable-track { width: 100%; height: 4px; cursor: pointer; background: #222; border: 1px solid #333; }
        input[type="range"]::-webkit-slider-thumb { height: 14px; width: 8px; background: var(--green); cursor: pointer; -webkit-appearance: none; margin-top: -6px; border: 1px solid #000; box-shadow: 0 0 5px var(--green); }

        .media-deck {
            border: 2px solid var(--green);
            background: rgba(0, 255, 65, 0.05);
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .deck-header { font-size: 10px; color: var(--green); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .deck-controls { display: flex; align-items: center; gap: 5px; justify-content: space-between; }
        .time-display { font-size: 10px; font-weight: bold; flex: 1; text-align: left; opacity: 0.8; }
        .deck-btns { display: flex; gap: 4px; }
        input[type="range"].deck-slider { flex: 1; height: 4px; accent-color: var(--green); cursor: pointer; }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

        #buffer { display: none; }
    </style>
</head>
<body onclick="handleGlobalClick();">

    <div class="viewport">
        <div class="pane">
            <label>FONTE ORIGINAL</label>
            <div class="media-layer" id="src-layer">
                <video id="v-core" playsinline crossorigin="anonymous"></video>
                <img id="img-core" alt="preview">
            </div>
            <div class="placeholder" id="ph-1">Nenhuma Mídia Selecionada</div>
        </div>
        <div class="pane">
            <label id="render-label">Renderizador (Saída)</label>
            <div class="media-layer" id="out-layer">
                <canvas id="canvas-core"></canvas>
            </div>
            <div class="placeholder" id="ph-2">Render Pausado</div>
        </div>
    </div>

    <div class="sidebar">
        <div id="hw-status">Clique para se Conectar ao Servidor</div>
        
        <input type="file" id="f-selector" accept="video/*,image/*" style="display:none">
        
        <div class="grid-2" style="margin-bottom: 5px;">
            <button class="btn" onclick="document.getElementById('f-selector').click()">📂 Arquivo</button>
            <button class="btn" id="btn-screen-share" style="color: var(--blue); border-color: var(--blue);">🖥️ Tela (PC)</button>
        </div>
        
        <button class="btn btn-start" id="btn-init" disabled>▶ Iniciar Render</button>

        <div class="control-group">
            <label>Modo de Render <span class="stat-val" id="s-proc">LOCAL</span></label>
            <button class="btn" id="btn-toggle-engine">Ativar Cloud Render</button>
        </div>

        <div class="media-deck">
            <div class="deck-header" id="deck-filename">Nenhum Arquivo</div>
            <div class="deck-controls">
                <span class="time-display" id="deck-time">00:00 / 00:00</span>
                <div class="deck-btns">
                    <button class="btn" id="deck-play-pause" style="padding:4px 10px">PLAY</button>
                    <button class="btn" onclick="location.reload()" style="padding:4px 10px; color:var(--danger); border-color:var(--danger)">⏏</button>
                </div>
            </div>
            <input type="range" id="deck-progress" class="deck-slider" value="0" step="0.1">
            <div class="control-group" style="margin-top: 5px;">
                <label>Volume <span class="stat-val" id="s-vol">100%</span></label>
                <input type="range" id="c-vol" min="0" max="1" step="0.01" value="1">
            </div>
        </div>

        <div class="control-group">
            <label>Estilo <span class="stat-val" id="s-style">CLASSIC</span></label>
            <select id="c-style" class="btn">
                <option value="classic">Engine: ASCII Clássico</option>
                <option value="hires">Engine: HI-RES (Detalhado)</option>
                <option value="blocks">Engine: Blocos Densos</option>
                <option value="particles">Engine: Partículas</option>
            </select>
        </div>

        <div class="grid-2">
            <div class="control-group">
                <label>Resolução <span class="stat-val" id="s-rs">100</span></label>
                <input type="range" id="c-rs" min="30" max="400" value="100">
            </div>
            <div class="control-group">
                <label>FPS <span class="stat-val" id="s-fps">30</span></label>
                <input type="range" id="c-fps" min="10" max="60" value="30">
            </div>
        </div>

        <div style="border-top: 1px solid #333; margin: 10px 0; padding-top: 10px;">
            <label style="color:var(--blue)">Processamento</label>
            <div class="grid-2" style="margin-top: 8px;">
                <button class="btn" id="btn-flip">↔ ESPELHAR</button>
                <button class="btn" id="btn-invert">🌗 INVERTER</button>
            </div>
            <div class="grid-2" style="margin-top: 10px;">
                <div class="control-group">
                    <label>Brilho <span class="stat-val" id="s-br">1.0</span></label>
                    <input type="range" id="c-br" min="0.5" max="2.5" step="0.1" value="1.0">
                </div>
                <div class="control-group">
                    <label>Contraste <span class="stat-val" id="s-con">1.0</span></label>
                    <input type="range" id="c-con" min="0.5" max="3.0" step="0.1" value="1.0">
                </div>
            </div>
        </div>

        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px; margin-top:10px;">
            <button class="btn" id="btn-rec" disabled>⏺ GRAVAR</button>
            <button class="btn" id="btn-png">📸 SNAPSHOT</button>
        </div>
        
        <div id="ping-stats" style="font-size:9px; color:var(--blue); text-align:center; margin-top:5px">SERVER PING: -- ms</div>
    </div>

    <canvas id="buffer"></canvas>

<script>
/**
 * ASCII GEN v5.4.2 HYBRID - AUTO-SHARE AUTOMATION
 */

// ==========================================
// CONFIGURAÇÃO DO IP DO SERVIDOR (AQUI!)
// ==========================================
const serverIP = 'http://localhost:3000'; 
// ==========================================

const v = document.getElementById('v-core');
const img = document.getElementById('img-core');
const out = document.getElementById('canvas-core');
const oCtx = out.getContext('2d', { alpha: false });
const buf = document.getElementById('buffer');
const bCtx = buf.getContext('2d', { willReadFrequently: true });

const btnInit = document.getElementById('btn-init');
const btnRec = document.getElementById('btn-rec');
const btnScreen = document.getElementById('btn-screen-share');
const hwStatus = document.getElementById('hw-status');
const styleSelect = document.getElementById('c-style');

const MAPS = {
    classic: "$@B%8&WM#*oahkbdpqwmZO0QLCJUYXzcvunxrjft/\\|()1{}[]?-_+~<>i!lI;:,\"^`'. ",
    hires: "$@B%8&WM#*oahkbdpqwmZO0QLCJUYXzcvunxrjft/\\|()1{}[]?-_+~<>i!lI;:,^`'. ",
    blocks: "█▓▒░ "
};

let lookupTable = new Array(256), isRunning = false, currentMode = 'idle'; 
let socket = null, useCloud = false;
let audioCtx, audioSource, audioGain, audioDest, recorder, chunks = [], isRecording = false;
let isFlipped = false, isInverted = false;

const CELL_W = 8, CELL_H = 10;
const ASPECT_FIX = CELL_H / CELL_W;

function buildLookupTable(style) {
    let map = MAPS[style] || MAPS.classic;
    if (isInverted) map = map.split("").reverse().join("");
    for (let i = 0; i < 256; i++) lookupTable[i] = map[Math.floor((i / 256) * map.length)];
}

function initSocket() {
    if (socket) return;
    socket = io(serverIP, { timeout: 3000 });
    
    socket.on('connect', () => {
        hwStatus.innerText = "ONLINE: CLOUD READY";
        hwStatus.style.color = "var(--green)";
        hwStatus.style.borderColor = "var(--green)";
    });

    socket.on('connect_error', () => {
        hwStatus.innerText = "OFFLINE (LOCAL ONLY)";
        hwStatus.style.color = "var(--danger)";
        hwStatus.style.borderColor = "var(--danger)";
        useCloud = false;
        updateEngineUI();
    });

    socket.on('render-frame', (data) => {
        if (useCloud) renderASCIIFromCloud(data);
    });

    setInterval(() => {
        if(socket && socket.connected) {
            const start = Date.now();
            socket.emit('ping-check', () => {
                document.getElementById('ping-stats').innerText = `SERVER PING: ${Date.now() - start} ms`;
            });
        }
    }, 2000);
}

function updateEngineUI() {
    document.getElementById('s-proc').innerText = useCloud ? "CLOUD (NODE)" : "LOCAL";
    document.getElementById('btn-toggle-engine').innerText = useCloud ? "Voltar para LOCAL" : "Ativar Cloud Render";
}

document.getElementById('btn-toggle-engine').onclick = () => {
    if (!socket || !socket.connected) {
        initSocket();
        alert("Tentando conectar ao servidor em: " + serverIP);
        return;
    }
    useCloud = !useCloud;
    updateEngineUI();
};

function initAudioEngine(streamOrElement) {
    try {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            audioGain = audioCtx.createGain();
            audioDest = audioCtx.createMediaStreamDestination();
            audioGain.connect(audioCtx.destination);
            audioGain.connect(audioDest);
        }
        if (audioSource) audioSource.disconnect();
        
        if (streamOrElement instanceof MediaStream) {
            const tracks = streamOrElement.getAudioTracks();
            if (tracks.length > 0) {
                audioSource = audioCtx.createMediaStreamSource(streamOrElement);
                audioSource.connect(audioGain);
            }
        } else {
            audioSource = audioCtx.createMediaElementSource(streamOrElement);
            audioSource.connect(audioGain);
        }
        audioCtx.resume();
    } catch(e) { console.warn("Motor de áudio: ", e.message); }
}

function handleGlobalClick() {
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    if (!socket) initSocket();
}

function renderASCIIFromCloud({ascii, w, h}) {
    out.width = w * CELL_W; out.height = h * CELL_H;
    oCtx.fillStyle = "#000"; oCtx.fillRect(0, 0, out.width, out.height);
    oCtx.font = "bold 10px monospace"; oCtx.textBaseline = "top";
    ascii.forEach((p, i) => {
        const x = i % w, y = Math.floor(i / w);
        oCtx.fillStyle = p.cl;
        oCtx.fillText(p.c, x * CELL_W, y * CELL_H);
    });
}

function draw() {
    const source = (currentMode === 'video' || currentMode === 'screen') ? v : img;
    if(!source.videoWidth && !source.naturalWidth) return;

    const res = parseInt(document.getElementById('c-rs').value);
    const br = parseFloat(document.getElementById('c-br').value);
    const con = parseFloat(document.getElementById('c-con').value);
    const style = styleSelect.value;

    const vW = source.videoWidth || source.naturalWidth, vH = source.videoHeight || source.naturalHeight;
    const w = res, h = Math.round(res * (vH / vW) * ASPECT_FIX);

    buf.width = w; buf.height = h;
    bCtx.save();
    if(isFlipped) { bCtx.translate(w,0); bCtx.scale(-1,1); }
    bCtx.filter = `brightness(${br}) contrast(${con})`;
    bCtx.drawImage(source, 0, 0, w, h);
    bCtx.restore();

    if (useCloud && socket && socket.connected) {
        socket.emit('stream-frame', {
            image: buf.toDataURL('image/jpeg', 0.6),
            settings: { res: w, style: style, br: br, con: con, col: 1 }
        });
    } else {
        const pixels = bCtx.getImageData(0, 0, w, h).data;
        out.width = w * CELL_W; out.height = h * CELL_H;
        oCtx.fillStyle = "#000"; oCtx.fillRect(0, 0, out.width, out.height);
        oCtx.font = "bold 10px monospace"; oCtx.textBaseline = "top";

        for (let i = 0; i < pixels.length; i += 4) {
            const r = pixels[i], g = pixels[i+1], b = pixels[i+2];
            const avg = (r * 0.3 + g * 0.59 + b * 0.11) | 0;
            const x = (i/4) % w, y = Math.floor((i/4) / w);
            oCtx.fillStyle = `rgb(${r},${g},${b})`;
            if (style !== 'particles') {
                oCtx.fillText(lookupTable[avg], x * CELL_W, y * CELL_H);
            } else {
                if (avg < 25) continue;
                const rad = (avg / 255) * (CELL_W / 2) * 1.8;
                oCtx.beginPath(); oCtx.arc(x * CELL_W + CELL_W/2, y * CELL_H + CELL_H/2, rad, 0, Math.PI*2); oCtx.fill();
            }
        }
    }
}

let lastTick = 0;
function mainLoop(now) {
    if (!isRunning) return;
    const fps = parseInt(document.getElementById('c-fps').value);
    if (now - lastTick >= 1000 / fps) {
        draw();
        lastTick = now;
    }
    requestAnimationFrame(mainLoop);
}

async function startRecording() {
    if (isRecording) return;
    if (currentMode === 'video') { v.currentTime = 0; v.play(); }
    chunks = [];
    const stream = out.captureStream(30);
    if (audioDest && audioDest.stream.getAudioTracks().length > 0) {
        stream.addTrack(audioDest.stream.getAudioTracks()[0]);
    }
    recorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp8,opus' });
    recorder.ondataavailable = e => chunks.push(e.data);
    recorder.onstop = () => {
        const blob = new Blob(chunks, { type: 'video/webm' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
        a.download = `ASCII_PRO_${Date.now()}.webm`; a.click();
    };
    recorder.start();
    isRecording = true; btnRec.innerText = "⏹ PARAR"; btnRec.classList.add('btn-rec-active');
}

function stopRecording() {
    if (!isRecording || !recorder) return;
    recorder.stop(); isRecording = false;
    btnRec.innerText = "⏺ GRAVAR"; btnRec.classList.remove('btn-rec-active');
}

document.getElementById('f-selector').onchange = (e) => {
    const file = e.target.files[0]; if(!file) return;
    const url = URL.createObjectURL(file);
    document.getElementById('deck-filename').innerText = file.name.toUpperCase();
    if(file.type.startsWith('video')) {
        currentMode = 'video'; v.src = url; v.style.display = 'block'; img.style.display = 'none';
        v.onloadedmetadata = () => { btnInit.disabled = false; btnRec.disabled = false; };
    } else {
        currentMode = 'image'; img.src = url; img.style.display = 'block'; v.style.display = 'none';
        img.onload = () => { btnInit.disabled = false; btnRec.disabled = true; };
    }
};

function activateLayers() {
    isRunning = true;
    document.querySelectorAll('.placeholder').forEach(p => p.style.display = 'none');
    document.querySelectorAll('.media-layer').forEach(l => { l.style.display = 'flex'; l.style.opacity = '1'; });
    buildLookupTable(styleSelect.value);
    requestAnimationFrame(mainLoop);
}

btnInit.onclick = () => {
    activateLayers();
    if(currentMode === 'video') { initAudioEngine(v); v.play(); }
};

btnScreen.onclick = async () => {
    try {
        const stream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
        currentMode = 'screen'; v.srcObject = stream;
        v.style.display = 'block'; img.style.display = 'none';
        activateLayers();
        initAudioEngine(stream);
        btnInit.disabled = true; btnRec.disabled = false;
        stream.getVideoTracks()[0].onended = () => { if (isRecording) stopRecording(); isRunning = false; setTimeout(() => location.reload(), 1500); };
    } catch(e) { console.error(e); }
};

btnRec.onclick = () => isRecording ? stopRecording() : startRecording();

document.getElementById('c-vol').oninput = (e) => {
    const val = parseFloat(e.target.value);
    document.getElementById('s-vol').innerText = `${Math.round(val * 100)}%`;
    if (audioGain) audioGain.gain.value = val;
};

document.getElementById('btn-flip').onclick = () => { isFlipped = !isFlipped; document.getElementById('btn-flip').classList.toggle('btn-active'); };
document.getElementById('btn-invert').onclick = () => { isInverted = !isInverted; document.getElementById('btn-invert').classList.toggle('btn-active'); buildLookupTable(styleSelect.value); };
document.getElementById('c-rs').oninput = (e) => document.getElementById('s-rs').innerText = e.target.value;
document.getElementById('c-fps').oninput = (e) => document.getElementById('s-fps').innerText = e.target.value;
document.getElementById('c-br').oninput = (e) => document.getElementById('s-br').innerText = e.target.value;
document.getElementById('c-con').oninput = (e) => document.getElementById('s-con').innerText = e.target.value;

v.ontimeupdate = () => {
    document.getElementById('deck-time').innerText = `${formatTime(v.currentTime)} / ${formatTime(v.duration)}`;
    document.getElementById('deck-progress').value = (v.currentTime / v.duration) * 100;
};

function formatTime(s) {
    if (isNaN(s)) return "00:00";
    const m = Math.floor(s / 60), sec = Math.floor(s % 60);
    return `${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
}

document.getElementById('deck-play-pause').onclick = () => {
    if (v.paused) { v.play(); document.getElementById('deck-play-pause').innerText = "PAUSE"; }
    else { v.pause(); document.getElementById('deck-play-pause').innerText = "PLAY"; }
};

document.getElementById('btn-png').onclick = () => {
    const a = document.createElement('a'); a.href = out.toDataURL('image/png');
    a.download = `ASCII_SNAP_${Date.now()}.png`; a.click();
};

initSocket();
</script>
</body>
</html>
