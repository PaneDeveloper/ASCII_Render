<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASCII Gen V5.5 - TV Projects Hybrid</title>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<style>
:root{--green:#00ff41;--bg:#050505;--panel:#111;--danger:#ff3e3e;--blue:#00a2ff;--warning:#ffcc00}
body{background:var(--bg);color:var(--green);font-family:Courier New,monospace;margin:0;display:flex;height:100vh;overflow:hidden;user-select:none}
.viewport{display:flex;flex:1;padding:15px;gap:15px}
.pane{flex:1;background:black;border:2px solid #222;display:flex;justify-content:center;align-items:center;position:relative}
.pane label{position:absolute;top:10px;left:10px;font-size:10px;border:1px solid var(--green);padding:4px 8px;background:black}
.media-layer{display:none;width:100%;height:100%;justify-content:center;align-items:center}
canvas{max-width:100%;max-height:100%;image-rendering:pixelated}
.placeholder{color:#222;font-size:24px;font-weight:bold}
.sidebar{width:360px;background:var(--panel);padding:20px;display:flex;flex-direction:column;gap:8px;overflow-y:auto}
.btn{background:#111;border:1px solid var(--green);color:var(--green);padding:8px;cursor:pointer;font-size:11px}
.btn:hover{background:var(--green);color:black}
.control-group{display:flex;flex-direction:column;gap:3px}
label{font-size:9px;color:#777}
.stat-val{float:right;color:var(--green)}
</style>
</head>
<body onmousedown="unlockAudio()" ontouchstart="unlockAudio()">
<div class="viewport">
<div class="pane">
<label>FONTE</label>
<div class="media-layer" id="src-layer">
<video id="v-core" playsinline loop muted></video>
<img id="img-core">
</div>
<div class="placeholder">OFFLINE</div>
</div>
<div class="pane">
<label>RENDER</label>
<div class="media-layer">
<canvas id="canvas-core"></canvas>
</div>
<div class="placeholder">PAUSADO</div>
</div>
</div>
<div class="sidebar">
<div id="audio-status">⚠️ ÁUDIO BLOQUEADO</div>
<button class="btn" onclick="document.getElementById('f-selector').click()">Carregar Arquivo</button>
<input type="file" id="f-selector" accept="video/*,image/*" style="display:none">
<button class="btn" id="btn-init" disabled>▶ Iniciar</button>
<div class="control-group">
<label>Resolução <span class="stat-val" id="s-rs">100</span></label>
<input type="range" id="c-rs" min="30" max="300" value="100">
</div>
<div class="control-group">
<label>FPS <span class="stat-val" id="s-fps">30</span></label>
<input type="range" id="c-fps" min="10" max="60" value="30">
</div>
</div>
<canvas id="buffer"></canvas>
<script>
const v=document.getElementById("v-core")
const img=document.getElementById("img-core")
const out=document.getElementById("canvas-core")
const oCtx=out.getContext("2d",{alpha:false})
const buf=document.getElementById("buffer")
const bCtx=buf.getContext("2d",{willReadFrequently:true})
let audioCtx
let audioGain
let audioSource
let isRunning=false
let currentMode="idle"
const MAP="$@B%8&WM#*oahkbdpqwmZO0QLCJUYXzcvunxrjft/\\|()1{}[]?-_+~<>i!lI;:,\"^`'. "
let lookup=new Array(256)
function unlockAudio(){
if(!audioCtx){audioCtx=new(window.AudioContext||window.webkitAudioContext)();audioGain=audioCtx.createGain();audioGain.connect(audioCtx.destination)}
if(audioCtx.state==="suspended"){audioCtx.resume()}
document.getElementById("audio-status").innerText="🔊 ÁUDIO ATIVO"
}
function buildLookup(){for(let i=0;i<256;i++){lookup[i]=MAP[Math.floor((i/256)*MAP.length)]}}
function draw(){const src=currentMode==="video"?v:img;if(!src.videoWidth&&!src.naturalWidth)return
const res=parseInt(document.getElementById("c-rs").value)
const sw=src.videoWidth||src.naturalWidth
const sh=src.videoHeight||src.naturalHeight
const w=res
const h=Math.round(res*(sh/sw)*1.25)
buf.width=w;buf.height=h
bCtx.drawImage(src,0,0,w,h)
const pixels=bCtx.getImageData(0,0,w,h).data
out.width=w*8;out.height=h*10
oCtx.fillStyle="black";oCtx.fillRect(0,0,out.width,out.height)
oCtx.font="10px monospace"
for(let i=0;i<pixels.length;i+=4){const avg=(pixels[i]+pixels[i+1]+pixels[i+2])/3
const char=lookup[avg|0]
const x=((i/4)%w)*8
const y=Math.floor((i/4)/w)*10
oCtx.fillStyle=`rgb(${pixels[i]},${pixels[i+1]},${pixels[i+2]})`
oCtx.fillText(char,x,y)}
}
let lastTick=0
function loop(t){if(!isRunning)return
const fps=parseInt(document.getElementById("c-fps").value)
if(t-lastTick>1000/fps){draw();lastTick=t}
requestAnimationFrame(loop)}
document.getElementById("btn-init").onclick=()=>{unlockAudio();isRunning=true
 document.querySelectorAll(".media-layer").forEach(l=>l.style.display="flex")
 v.muted=false;v.play();requestAnimationFrame(loop)}
document.getElementById("f-selector").onchange=e=>{const file=e.target.files[0];if(!file)return
const url=URL.createObjectURL(file)
if(file.type.startsWith("video")){currentMode="video";v.src=url;v.style.display="block";img.style.display="none"}
else{currentMode="image";img.src=url;img.style.display="block";v.style.display="none"}
document.getElementById("btn-init").disabled=false}
document.getElementById("c-rs").oninput=e=>{document.getElementById("s-rs").innerText=e.target.value}
document.getElementById("c-fps").oninput=e=>{document.getElementById("s-fps").innerText=e.target.value}
buildLookup()
/* CORREÇÃO: qualquer clique ativa áudio */
document.addEventListener("click",unlockAudio,{once:true})
</script>
</body>
</html>
