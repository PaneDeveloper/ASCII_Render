<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>ASCII Gen</title><script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script><style>body{background:#050505;color:#00ff41;font-family:Courier New,monospace;margin:0;display:flex;height:100vh;overflow:hidden}.viewport{flex:1;display:flex;padding:10px;gap:10px}.pane{flex:1;display:flex;justify-content:center;align-items:center;background:#000;border:2px solid #222;position:relative}.pane label{position:absolute;top:10px;left:10px;font-size:10px;border:1px solid #00ff41;padding:4px 8px}canvas{image-rendering:pixelated;max-width:100%;max-height:100%}.sidebar{width:300px;background:#111;padding:12px;display:flex;flex-direction:column;gap:8px;overflow:auto}.btn{background:#1a1a1a;border:1px solid #00ff41;color:#00ff41;padding:6px;font-size:11px;cursor:pointer}.btn:hover{background:#00ff41;color:#000}</style></head><body><div class="viewport"><div class="pane"><label>FONTE</label><video id="v" playsinline></video><img id="img"></div><div class="pane"><label>ASCII</label><canvas id="out"></canvas></div></div><div class="sidebar"><button class="btn" onclick="fileInput.click()">📂 Arquivo</button><button class="btn" id="btnProj">📦 Arquivos_Render</button><button class="btn" id="btnScreen">🖥 Tela</button><button class="btn" id="btnStart">▶ Iniciar</button><input type="file" id="fileInput" style="display:none" accept="video/*,image/*"></div><canvas id="buf" style="display:none"></canvas><script>const v=document.getElementById("v"),img=document.getElementById("img"),out=document.getElementById("out"),ctx=out.getContext("2d"),buf=document.getElementById("buf"),bctx=buf.getContext("2d",{willReadFrequently:true});let mode="idle",run=false;const MAP="$@B%8&WM#*oahkbdpqwmZO0QLCJUYXzcvunxrjft/\\|()1{}[]?-_+~<>i!lI;:,\"^`'. ",lookup=new Array(256);for(let i=0;i<256;i++)lookup[i]=MAP[Math.floor(i/256*MAP.length)];const CW=8,CH=10;function draw(){let src=mode==="image"?img:v;if(!src.videoWidth&&!src.naturalWidth)return;let w=120,h=70;buf.width=w;buf.height=h;bctx.drawImage(src,0,0,w,h);let px=bctx.getImageData(0,0,w,h).data;out.width=w*CW;out.height=h*CH;ctx.fillStyle="#000";ctx.fillRect(0,0,out.width,out.height);ctx.font="10px monospace";for(let i=0;i<px.length;i+=4){let r=px[i],g=px[i+1],b=px[i+2],lum=(r*.3+g*.59+b*.11)|0,ch=lookup[lum],x=(i/4)%w,y=Math.floor(i/4/w);ctx.fillStyle=`rgb(${r},${g},${b})`;ctx.fillText(ch,x*CW,y*CH)}}function loop(){if(!run)return;draw();requestAnimationFrame(loop)}document.getElementById("btnStart").onclick=()=>{run=true;requestAnimationFrame(loop);if(mode==="video")v.play()};fileInput.onchange=e=>{let f=e.target.files[0];if(!f)return;let url=URL.createObjectURL(f);if(f.type.startsWith("video")){mode="video";v.src=url;v.muted=true;img.style.display="none";v.style.display="block"}else{mode="image";img.src=url;v.style.display="none";img.style.display="block"}};document.getElementById("btnScreen").onclick=async()=>{let s=await navigator.mediaDevices.getDisplayMedia({video:true,audio:true});mode="video";v.srcObject=s;v.muted=true;v.play()};document.getElementById("btnProj").onclick=async()=>{let r=await fetch("Arquivos_Render/lista.json"),files=await r.json(),m=document.createElement("div");m.style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#000;border:2px solid #0f0;padding:10px";files.forEach(f=>{let b=document.createElement("button");b.innerText=f;b.className="btn";b.onclick=()=>{let p="Arquivos_Render/"+f;if(f.match(/\.(mp4|webm)$/i)){mode="video";v.src=p;v.muted=true}else{mode="image";img.src=p}document.body.removeChild(m)};m.appendChild(b)});document.body.appendChild(m)};</script></body></html>
